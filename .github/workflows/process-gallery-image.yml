name: Process Gallery Image

# Runs when a new image file is committed to public/galleries/<slug>/
# Sharp generates thumb + display + dimensions, manifest gets updated, derivatives
# get committed back to the same branch.
#
# Triggers on both dev and main so the same workflow serves staging and production.

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'public/galleries/**'

# Allow concurrent runs across galleries, but serialize per branch to avoid
# the manifest-update race condition (two pushes both reading the same JSON,
# each adding their own entry, second write overwrites first).
concurrency:
  group: gallery-processor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Loop guard - both the Worker's publish commits AND the Action's own
    # derivative commits are authored by photoandmoto-publisher[bot] (because
    # both use the same GitHub App installation token). We distinguish them
    # by commit message:
    #   - Action's derivative commit:  "chore(gallery): process new image derivatives"
    #   - Worker's publish commit:     "Gallery: publish photo #N to <slug>"
    # Skip only the Action's own commits to prevent infinite loops.
    if: "!startsWith(github.event.head_commit.message, 'chore(gallery): process new image derivatives') && !startsWith(github.event.head_commit.message, 'chore(gallery): move ')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          # Need full history so the detect step can diff against previous commit.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Detect new gallery images
        id: detect
        run: |
          # CRITICAL: Make Git output raw UTF-8 filenames instead of quoted/escaped ones.
          # Without this, files with a, o, a (very common for Finnish content) get
          # output as quoted octal-escaped sequences and fail the grep regex.
          git config --global core.quotePath false

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          echo "-- Diagnostic --"
          echo "BEFORE: $BEFORE"
          echo "AFTER:  $AFTER"

          # Edge case: first push to a new branch - BEFORE is all zeros.
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-parse $AFTER^ 2>/dev/null || echo "")
            echo "BEFORE was zeros, using parent: $BEFORE"
          fi

          if [ -z "$BEFORE" ]; then
            CHANGED=$(git show --name-only --pretty=format: $AFTER)
          else
            CHANGED=$(git diff --name-only --diff-filter=A "$BEFORE" "$AFTER")
          fi

          echo ""
          echo "-- All added files in push --"
          echo "$CHANGED"
          echo "-- End list --"
          echo ""

          # Only consider added image files directly under public/galleries/<slug>/
          # (NOT under thumbs/ or display/ - those are outputs, not inputs)
          echo "$CHANGED" | grep -E '^public/galleries/[^/]+/[^/]+\.(jpg|jpeg|png|webp|JPG|JPEG|PNG|WEBP)$' > new_images.txt || true

          # Safety net: fall back to the latest commit's tree if diff returned nothing.
          if [ ! -s new_images.txt ]; then
            echo "Primary diff found nothing - trying fallback (latest commit only)..."
            git show --name-only --pretty=format: "$AFTER" | grep -E '^public/galleries/[^/]+/[^/]+\.(jpg|jpeg|png|webp|JPG|JPEG|PNG|WEBP)$' > new_images.txt || true
          fi

          if [ ! -s new_images.txt ]; then
            echo "No new gallery source images to process."
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found new images:"
          cat new_images.txt
          echo "found=true" >> $GITHUB_OUTPUT

      - name: Process each new image
        if: steps.detect.outputs.found == 'true'
        run: |
          while IFS= read -r filepath; do
            [ -z "$filepath" ] && continue
            slug=$(echo "$filepath" | awk -F'/' '{print $3}')
            filename=$(echo "$filepath" | awk -F'/' '{print $4}')
            echo ""
            echo ">> Processing: $slug / $filename"
            npm run generate-gallery -- "$slug" --add "$filename"
          done < new_images.txt

      - name: Commit derivatives
        if: steps.detect.outputs.found == 'true'
        run: |
          git config user.name "photoandmoto-publisher[bot]"
          git config user.email "photoandmoto-publisher[bot]@users.noreply.github.com"

          git add public/galleries/*/thumbs/ public/galleries/*/display/ src/content/galleries/

          if git diff --staged --quiet; then
            echo "Nothing to commit - derivatives already up to date."
            exit 0
          fi

          # IMPORTANT: this commit message must match the loop guard's startsWith()
          # check at the top of the job. If you change one, change the other.
          git commit -m "chore(gallery): process new image derivatives"
          git push origin ${{ github.ref_name }}
