name: Process Gallery Image

# Runs when a new image file is committed to public/galleries/<slug>/
# Sharp generates thumb + display + dimensions, manifest gets updated, derivatives
# get committed back to the same branch.
#
# Triggers on both dev and main so the same workflow serves staging and production.

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'public/galleries/**'

# Allow concurrent runs across galleries, but serialize per branch to avoid
# the manifest-update race condition (two pushes both reading the same JSON,
# each adding their own entry, second write overwrites first).
concurrency:
  group: gallery-processor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Skip runs that the App itself triggered (prevents Action loops).
    # The App commits use a "[skip ci]" tag in the message; bot commits also skip.
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      github.event.head_commit.author.name != 'photoandmoto-publisher[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Detect new gallery images
        id: detect
        run: |
          # Grab list of files changed in this push under public/galleries/.
          # Uses the GitHub-provided before/after SHAs from the push event.
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          # Edge case: first push to a new branch — BEFORE is all zeros.
          # In that case, just compare against the commit's parent.
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-parse $AFTER^ 2>/dev/null || echo "")
          fi

          if [ -z "$BEFORE" ]; then
            CHANGED=$(git show --name-only --pretty=format: $AFTER)
          else
            CHANGED=$(git diff --name-only --diff-filter=A "$BEFORE" "$AFTER")
          fi

          # Only consider added image files directly under public/galleries/<slug>/
          # (NOT under thumbs/ or display/ — those are outputs, not inputs)
          echo "$CHANGED" | grep -E '^public/galleries/[^/]+/[^/]+\.(jpg|jpeg|png|webp|JPG|JPEG|PNG|WEBP)$' > new_images.txt || true

          if [ ! -s new_images.txt ]; then
            echo "No new gallery source images to process."
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found new images:"
          cat new_images.txt
          echo "found=true" >> $GITHUB_OUTPUT

      - name: Process each new image
        if: steps.detect.outputs.found == 'true'
        run: |
          while IFS= read -r filepath; do
            [ -z "$filepath" ] && continue

            # Extract slug and filename from path: public/galleries/<slug>/<filename>
            slug=$(echo "$filepath" | awk -F'/' '{print $3}')
            filename=$(echo "$filepath" | awk -F'/' '{print $4}')

            echo ""
            echo "▶ Processing: $slug / $filename"

            npm run generate-gallery -- "$slug" --add "$filename"
          done < new_images.txt

      - name: Commit derivatives
        if: steps.detect.outputs.found == 'true'
        run: |
          git config user.name "photoandmoto-publisher[bot]"
          git config user.email "photoandmoto-publisher[bot]@users.noreply.github.com"

          git add public/galleries/*/thumbs/ public/galleries/*/display/ src/content/galleries/

          if git diff --staged --quiet; then
            echo "Nothing to commit — derivatives already up to date."
            exit 0
          fi

          git commit -m "chore(gallery): process new image derivatives [skip ci]"
          git push origin ${{ github.ref_name }}
